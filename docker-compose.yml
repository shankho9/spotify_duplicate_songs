version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: spotify_cleaner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    command: bash -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/spotify_cleaner
      FRONTEND_ORIGIN: http://127.0.0.1:3000
    depends_on:
      - postgres

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: bash -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      # Must match the URL bar and Spotify “Redirect URI” host (e.g. …/api/auth/callback/spotify).
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_BACKEND_URL: http://127.0.0.1:8000
    depends_on:
      - backend

volumes:
  postgres_data:
